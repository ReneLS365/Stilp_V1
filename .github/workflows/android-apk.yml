name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "android/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-android-apk:
    name: Build Android APK artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi

      - name: Remove generated Flutter template widget test
        run: |
          if [ -f "test/widget_test.dart" ] && grep -q "Counter increments smoke test" "test/widget_test.dart"; then
            rm "test/widget_test.dart"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stilp-v1-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
